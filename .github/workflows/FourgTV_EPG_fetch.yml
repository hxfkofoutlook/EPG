name: Daily FourgTV EPG Update

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 (台灣時間 08:00)
  workflow_dispatch:

jobs:
  generate-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pytz loguru

      - name: Create output directory
        run: mkdir -p output

      - name: Run fourgtv_epg.py
        run: |
          sleep $((RANDOM % 30))
          python scripts/fourgtv_epg.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*
          if git diff --staged --quiet; then
            echo "沒有變更需要提交"
          else
            git commit -m "Auto-update EPG data (output)"
            git push
          fi

      - name: Verify output files
        if: always()
        run: |
          ls -la output
          cat output/epg_generator.log
