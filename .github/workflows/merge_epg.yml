name: Merge EPG (4gtv + ofiii)

on:
  schedule:
    # 北京时间 00:05 和 09:00 (UTC+8)
    # GitHub cron 为 UTC 时间，需减去 8 小时
    - cron: '0 16 * * *'    # UTC 16:00 = 北京时间 00:00
    - cron: '0 1 * * *'     # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:        # 允许手动触发

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install fast-xml-parser

      - name: Run merge script
        run: node scripts/merge_epg.js

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/4gtv_tv.xml.gz
          git diff --staged --quiet || git commit -m "Auto update merged EPG [skip ci]"
          git push
